name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r DailyArtWallpaper/requirements.txt
        pip install pyinstaller
    
    - name: Build PyInstaller bundle
      run: |
        pyinstaller DailyArtWallpaper.spec
    
    - name: Download and setup Inno Setup
      run: |
        choco install innosetup
    
    - name: Build installer
      run: |
        iscc /F"DailyArtWallpaperSetup" installer/setup.iss
    
    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload installer to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/DailyArtWallpaperSetup.exe
        asset_name: DailyArtWallpaperSetup.exe
        asset_content_type: application/octet-stream
